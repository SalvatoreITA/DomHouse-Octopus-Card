blueprint:
  name: 🐙 Octopus Tracker - LUCE 💡
  description: >
    Ricevi notifiche quando le tariffe LUCE sul sito diventano più convenienti o quando il tuo contratto sta per scadere.

    ⚙️ **Versione**: 1.0.0

    👨‍💻 **Sviluppatore**: Salvatore Lentini

    🌐 **Sito Web**: [www.domhouse.it](https://domhouse.it/octopus-card-le-tariffe-octopus-energy-su-home-assistant/)
  domain: automation
  input:
    enable_persistent:
      name: 🔔 Notifica Persistente
      description: Crea una notifica interna nell'app di Home Assistant.
      default: true
      selector:
        boolean: {}
    notify_service:
      name: 📱 Servizio Notifica Push (Opzionale)
      description: "Servizio di notifica del tuo telefono o gruppo (es: notify.mobile_app_tuo_telefono)."
      default: ""
      selector:
        text: {}
    soglia_scadenza:
      name: ⏱️ Preavviso Scadenza (Giorni)
      default: 30
      selector:
        number:
          min: 1
          max: 90
          step: 1
          unit_of_measurement: "giorni"
    luce_prezzo_tu:
      name: Il tuo Prezzo Luce
      selector:
        entity:
          domain: sensor
    luce_pcv_tu:
      name: La tua PCV Luce
      selector:
        entity:
          domain: sensor
    luce_giorni_scadenza:
      name: Giorni Scadenza Luce
      selector:
        entity:
          domain: sensor
    luce_prezzo_sito:
      name: Prezzo Sito Luce
      selector:
        entity:
          domain: sensor
    luce_pcv_sito:
      name: PCV Sito Luce
      selector:
        entity:
          domain: sensor

variables:
  enable_persistent: !input enable_persistent
  notify_service: !input notify_service
  p_sito: !input luce_prezzo_sito
  pcv_sito: !input luce_pcv_sito
  pcv_tu: !input luce_pcv_tu
  giorni: !input luce_giorni_scadenza

mode: single

trigger:
  # Trigger nativo e istantaneo!
  - platform: numeric_state
    entity_id: !input luce_prezzo_sito
    below: !input luce_prezzo_tu
    id: luce_drop
  - platform: numeric_state
    entity_id: !input luce_giorni_scadenza
    below: !input soglia_scadenza
    id: luce_scadenza

action:
  - choose:
      - conditions:
          - condition: trigger
            id: luce_drop
          # Controllo sicurezza PCV (effettuato solo al momento del trigger)
          - condition: template
            value_template: "{{ states(pcv_sito)|float(999) <= states(pcv_tu)|float(999) }}"
        sequence:
          - choose:
              - conditions: "{{ enable_persistent }}"
                sequence:
                  - service: persistent_notification.create
                    data:
                      title: "🐙 Octopus: Nuova Offerta Luce!"
                      message: "La tariffa Luce sul sito è scesa a {{ states(p_sito) }} €/kWh. È matematicamente PIÙ CONVENIENTE!"
          - choose:
              - conditions: "{{ notify_service != '' }}"
                sequence:
                  - service: "{{ notify_service }}"
                    data:
                      title: "🐙 Nuova Offerta Luce Octopus!"
                      message: "La tariffa è scesa a {{ states(p_sito) }} €/kWh! È più conveniente del tuo contratto."
                      data:
                        actions:
                          - action: "URI"
                            title: "💬 Scrivi ad Octopus"
                            uri: "https://wa.me/390238582776?text=Ciao%20Octopus%21%20Vorrei%20aggiornare%20il%20contratto%20Luce."

      - conditions:
          - condition: trigger
            id: luce_scadenza
        sequence:
          - choose:
              - conditions: "{{ enable_persistent }}"
                sequence:
                  - service: persistent_notification.create
                    data:
                      title: "⚠️ Octopus: Scadenza Luce!"
                      message: "Mancano meno di {{ states(giorni) }} giorni alla scadenza Elettrica."
          - choose:
              - conditions: "{{ notify_service != '' }}"
                sequence:
                  - service: "{{ notify_service }}"
                    data:
                      title: "⚠️ Scadenza Contratto Luce"
                      message: "Mancano {{ states(giorni) }} giorni alla scadenza. Rinnova l'offerta!"
                      data:
                        actions:
                          - action: "URI"
                            title: "💬 Rinnova su WhatsApp"
                            uri: "https://wa.me/390238582776?text=Ciao%21%20Voglio%20rinnovare%20la%20Luce."
